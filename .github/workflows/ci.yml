name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: challenge_test
          POSTGRES_USER: challenge
          POSTGRES_PASSWORD: challenge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U challenge"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build & Test
        working-directory: backend
        env:
          DB_URL: jdbc:postgresql://localhost:5432/challenge_test
          DB_USERNAME: challenge
          DB_PASSWORD: challenge
          JWT_SECRET: ci-test-secret-key-at-least-256-bits-long-for-hmac-sha
        run: ./gradlew build

  frontend:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build
